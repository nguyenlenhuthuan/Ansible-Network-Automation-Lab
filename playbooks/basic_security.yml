---
- name: Basic Security Configuration and Fact Gathering (No Lockout Version)
  hosts: routers
  gather_facts: false 

  tasks:
    - name: 1. Thu thập thông tin phần cứng và OS của Router (ios_facts)
      cisco.ios.ios_facts:
        gather_subset: hardware

    - name: 2. In thông tin vừa thu thập ra màn hình (Debug)
      debug:
        msg: "Thiết bị {{ inventory_hostname }} đang chạy hệ điều hành IOS version {{ ansible_net_version }}"

    - name: 3. Tạo User quản trị nội bộ (Chốt chặn chống Lockout)
      cisco.ios.ios_user:
        name: admin
        privilege: 15
        update_password: always
        configured_password: cisco123 
        state: present

    - name: 4. Bật mã hoá mật khẩu và cấu hình Enable Secret
      cisco.ios.ios_config:
        lines:
          - enable secret cisco123
          - service password-encryption

    - name: 5. Cấu hình bảo mật truy cập từ xa an toàn (VTY/SSH)
      cisco.ios.ios_config:
        lines:
          - login local
          - transport input ssh
        parents: line vty 0 4
        
    - name: 6. Cấu hình mật khẩu cho cổng Console
      cisco.ios.ios_config:
        lines:
          - password cisco123
          - login
        parents: line console 0